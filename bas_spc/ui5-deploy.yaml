# yaml-language-server: $schema=https://sap.github.io/ui5-tooling/schema/ui5.yaml.json

specVersion: "3.1"
metadata:
  name: com.emami.spc
type: application
builder:
  resources: 
    excludes:
      - /test/**
      - /localService/**
  customTasks:
    - name: deploy-to-abap
      afterTask: generateCachebusterInfo
      configuration:
        target:
          destination: NWD
          url: http://gwdev:8000
        app:
          name: ZMM_PAK_SPEC_MG
          description: Specification Management
          package: ZEMAMI
          transport: NGDK905857
        exclude:
          - /test/
